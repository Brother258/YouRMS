
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: linear-gradient(135deg, #eaf7ff 0%, #f6fbff 100%);
    color: #1f2937;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.contact-form {
    background: #ffffff;
    border-radius: 14px;
    padding: 30px;
    box-shadow: 0 12px 28px rgba(0, 174, 239, 0.18);
    border: 1px solid #d8f0fb;
    text-align: center;
    width: 420px;
    max-width: 80%;
}

.contact-form h2 {
    font-size: 26px;
    margin-bottom: 8px;
    color: #0077cc;
}

.subtitle {
    margin-bottom: 20px;
    color: #475569;
    font-size: 0.95rem;
}

.input-field {
    margin-bottom: 20px;
    text-align: left;
}

.input-field label {
    display: block;
    margin-bottom: 5px;
}

.input-field input,
.input-field textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #cfeaf8;
    border-radius: 5px;
    background: #f8fdff;
    color: #1f2937;
}

.input-field input:focus,
.input-field textarea:focus {
    background: #ffffff;
    border-color: #00aeef;
    outline: none;
}

button {
    background: #00aeef;
    color: white;
    border: none;
    border-radius: 5px;
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.3s;
}

button:hover {
    background: #0077cc;
}

</style>
<body>
<script>
var submitted=false
</script>

<iframe name="hiddenConfirm" id="hiddenConfirm" style="display:none;" onload="if(submitted){window.location='submitted-successfully.html'}"> </iframe>
    <div class="contact-form">
        <h2>YouRMS Email Updates</h2>
        <p class="subtitle">Get announcements and update notices from YouRMS.</p>
        <form action="https://docs.google.com/forms/d/e/1FAIpQLScVSVvjt1XLpR9r3gURQTxG2QQR1gMukvgpvgSn6Uo9MbYeeQ/formResponse" method="POST" target="hiddenConfirm" onsubmit="submitted=true">
            <div class="input-field">
                <label for="email">Email</label>
                <input type="email" id="email" name="entry.1210370499" placeholder="Enter your email address" required>
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
